<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>  

<div class="contenedor">
    <h1>Sistema de Ventas</h1>    

    <form id="formulario">
        <div class="grupo">
            <label>Cliente</label>
            <input type="text" id="cliente" placeholder="Nombre del cliente" required>
        </div>

        <div class="grupo">
            <label>Producto</label>
            <input type="text" id="producto" placeholder="Producto" required>
        </div>

        <div class="grupo">
            <label>Cantidad</label>
            <input type="number" id="cantidad" placeholder="Cantidad" min="1" required>
        </div>

        <div class="grupo">
            <label>Precio Unitario</label>
            <input type="number" id="precio_unitario" placeholder="Precio Unitario" min="0.01" step="0.01" required>
        </div>

        <div class="grupo">
            <label>Total</label>
            <input type="text" id="total" placeholder="..." readonly>
        </div>

        <button type="button" id="btnCalcular">Calcular</button>
        <button type="submit">Registrar Venta</button>
    </form>

    <div id="mensaje" style="margin-top: 20px;"></div>
</div>

<script src="scrip.js"></script>
</body>
</html>
